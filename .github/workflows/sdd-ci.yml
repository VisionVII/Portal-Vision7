name: SDD Validation & CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install --legacy-peer-deps

      - name: ESLint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install --legacy-peer-deps

      - name: Production Build
        run: npm run build

      - name: Bundle Size Report
        run: |
          echo "### Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh dist/assets/*.js | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total:** $(du -sh dist | cut -f1)" >> $GITHUB_STEP_SUMMARY

  sdd-validate:
    name: SDD Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate SDD Specs
        run: bash sdd/scripts/sdd-validate.sh

      - name: Check SDD Freshness
        run: bash sdd/scripts/sdd-stale-check.sh --days=60
        continue-on-error: true

  sdd-sync-check:
    name: SDD Sync Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for file drift
        run: bash sdd/scripts/sdd-sync.sh all --dry-run

  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  migrations-check:
    name: Validate Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SQL syntax
        run: |
          errors=0
          for f in supabase/migrations/*.sql; do
            [ -f "$f" ] || continue
            if grep -qiP '(DROP\s+TABLE|DROP\s+SCHEMA|TRUNCATE)\s' "$f" 2>/dev/null; then
              echo "⚠️  Destructive statement in $f"
            fi
            result=$(python3 .github/scripts/check_sql_parens.py "$f")
            if [[ "$result" == MISMATCH* ]]; then
              echo "❌ Unmatched parentheses in $f ($result)"
              errors=$((errors + 1))
            fi
          done
          echo "### Migration Check" >> $GITHUB_STEP_SUMMARY
          echo "Checked $(ls supabase/migrations/*.sql 2>/dev/null | wc -l) migration files" >> $GITHUB_STEP_SUMMARY
          if [ "$errors" -gt 0 ]; then
            echo "❌ $errors error(s) found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ All migrations valid" >> $GITHUB_STEP_SUMMARY
