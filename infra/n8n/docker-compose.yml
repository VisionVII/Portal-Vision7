# ─────────────────────────────────────────────────────────────────────────────
# n8n — Produção 24/7 com persistência PostgreSQL e segurança reforçada
# ─────────────────────────────────────────────────────────────────────────────
# Uso:
#   cp .env.example .env  # preencher variáveis
#   docker compose up -d
#   docker compose logs -f n8n
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:
  # ── n8n (workflow engine) ───────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: vision7-n8n
    restart: always
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      # ── Persistência PostgreSQL (substituir SQLite) ─────────────────────
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${N8N_DB_HOST}
      - DB_POSTGRESDB_PORT=${N8N_DB_PORT:-5432}
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${N8N_DB_USER}
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - DB_POSTGRESDB_SCHEMA=${N8N_DB_SCHEMA:-n8n}

      # ── Encriptação de credenciais ──────────────────────────────────────
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

      # ── API (usada pelo Edge Function proxy) ────────────────────────────
      - N8N_API_ENABLED=true
      - N8N_API_KEY=${N8N_API_KEY}

      # ── Webhook (URL pública para triggers) ─────────────────────────────
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}

      # ── Execuções: persistir tudo no DB ─────────────────────────────────
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true

      # ── Prune automático de execuções antigas (30 dias) ─────────────────
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=720

      # ── Timezone ────────────────────────────────────────────────────────
      - GENERIC_TIMEZONE=Europe/Lisbon
      - TZ=Europe/Lisbon

      # ── Segurança: desativar acesso público ao editor ───────────────────
      # O editor fica acessível apenas via rede interna/VPN
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-https://n8n.vision7.pt}

      # ── Limites de segurança ────────────────────────────────────────────
      # Máx. payload de webhook (default 16MB → reduzir para 2MB)
      - N8N_PAYLOAD_SIZE_MAX=2
      # Desativar templates públicas (reduz superfície de ataque)
      - N8N_TEMPLATES_ENABLED=false
      # Desativar versionamento de workflows por performance
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      # Desativar diagnóstico/telemetria
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false

      # ── Rate limit interno do n8n (proteção adicional) ──────────────────
      # Máx. workflows concorrentes
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_TIMEOUT=300
      - EXECUTIONS_TIMEOUT_MAX=600

    volumes:
      # Backup da encryption key e ficheiros locais (não o DB)
      - n8n_data:/home/node/.n8n

    networks:
      - vision7-net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── PostgreSQL dedicado para n8n (opcional — usar se não quiser partilhar o Supabase PG) ─
  n8n-db:
    image: postgres:16-alpine
    container_name: vision7-n8n-db
    restart: always
    environment:
      - POSTGRES_DB=${N8N_DB_NAME:-n8n}
      - POSTGRES_USER=${N8N_DB_USER}
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD}
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${N8N_DB_EXTERNAL_PORT:-5433}:5432"
    networks:
      - vision7-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER:-n8n_service} -d ${N8N_DB_NAME:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  n8n_data:
    driver: local
  n8n_db_data:
    driver: local

networks:
  vision7-net:
    driver: bridge
