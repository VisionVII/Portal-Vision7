<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" role="img" aria-labelledby="visionTitle visionDesc">
  <title id="visionTitle">Vision premium logo</title>
  <desc id="visionDesc">Logo wordmark Vision com ícone estilizado 7 em azul profundo e cyan.</desc>
  <defs>
    <linearGradient id="visionWord" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF6FF"/>
      <stop offset="45%" stop-color="#68B8FF"/>
      <stop offset="100%" stop-color="#0B57D0"/>
    </linearGradient>
    <linearGradient id="visionSeven" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C7F6FF"/>
      <stop offset="50%" stop-color="#38D9FF"/>
      <stop offset="100%" stop-color="#0B57D0"/>
    </linearGradient>
    <linearGradient id="visionRing" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8FEAFF"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="visionGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1D4ED8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g filter="url(#visionGlow)">
    <path d="M34 135h356" stroke="url(#visionRing)" stroke-width="5" stroke-linecap="round" opacity="0.95"/>

    <text x="26" y="108" fill="url(#visionWord)" font-size="86" font-weight="800" font-family="Orbitron, Rajdhani, Arial, sans-serif" letter-spacing="4">
      VISION
    </text>

    <path d="M480 30h214l-118 130h-48l84-95H480z" fill="url(#visionSeven)"/>
    <path d="M455 124c42-22 88-34 136-34 43 0 82 9 115 28-37-2-85 4-134 19-47 14-87 31-120 50-16 9-31 12-44 8-9-3-14-8-14-16 0-17 20-34 61-55z" fill="none" stroke="url(#visionRing)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
